name: Build and Deploy

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: write


jobs:

  build-and-deploy:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout application code
      uses: actions/checkout@v4


    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::381491929425:role/GitHubActionsRole
        aws-region: us-east-1


    - name: Login to ECR
      uses: aws-actions/amazon-ecr-login@v2



    # ---------------- BACKEND ----------------

    - name: Build backend image
      run: |
        docker build -t backend:v1 ./backend


    - name: Tag backend image
      run: |
        docker tag backend:v1 \
        381491929425.dkr.ecr.us-east-1.amazonaws.com/backend:${{ github.sha }}


    - name: Push backend image
      run: |
        docker push \
        381491929425.dkr.ecr.us-east-1.amazonaws.com/backend:${{ github.sha }}




    # ---------------- FRONTEND ----------------


    - name: Build frontend image
      run: |
        docker build -t frontend:v1 ./frontend


    - name: Tag frontend image
      run: |
        docker tag frontend:v1 \
        381491929425.dkr.ecr.us-east-1.amazonaws.com/frontend:${{ github.sha }}


    - name: Push frontend image
      run: |
        docker push \
        381491929425.dkr.ecr.us-east-1.amazonaws.com/frontend:${{ github.sha }}




    # ---------------- GITOPS UPDATE ----------------


    - name: Update GitOps repository
      env:
        GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}

      run: |


        git clone https://github.com/karipadma/ecommerce-gitops.git


        cd ecommerce-gitops



        # Update backend image

        sed -i "s|image:.*backend.*|image: 381491929425.dkr.ecr.us-east-1.amazonaws.com/backend:${{ github.sha }}|" \
        backend/deployment.yaml



        # Update frontend image in gitops

        sed -i "s|image:.*frontend.*|image: 381491929425.dkr.ecr.us-east-1.amazonaws.com/frontend:${{ github.sha }}|" \
        frontend/deployment.yaml




        git config user.name "github-actions"

        git config user.email "github-actions@github.com"



        git add backend/deployment.yaml frontend/deployment.yaml



        git commit -m "Update frontend and backend images ${{ github.sha }}" || echo "No changes"



        git remote set-url origin https://x-access-token:${GITOPS_TOKEN}@github.com/karipadma/ecommerce-gitops.git



        git push origin main
