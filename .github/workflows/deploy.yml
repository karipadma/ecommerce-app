permissions:
  id-token: write
  contents: write

jobs:

  build-backend:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: AWS Login
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::381491929425:role/GitHubActionsRole
        aws-region: us-east-1

    - name: Login ECR
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build Image
      run: |
        docker build -t backend:v1 ./backend

    - name: Tag Image
      run: |
        docker tag backend:v1 \
        381491929425.dkr.ecr.us-east-1.amazonaws.com/backend:${{ github.sha }}

    - name: Push Image
      run: |
        docker push \
        381491929425.dkr.ecr.us-east-1.amazonaws.com/backend:${{ github.sha }}


    - name: Update GitOps Repo
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      run: |

        git clone https://github.com/karipadma/ecommerce-gitops.git

        cd ecommerce-gitops

        sed -i "s|image:.*|image: 381491929425.dkr.ecr.us-east-1.amazonaws.com/backend:${{ github.sha }}|" \
        backend/deployment.yaml


        git config user.name "github-actions"
        git config user.email "github-actions@github.com"

        git add .

        git commit -m "Update backend image to ${{ github.sha }}"

        git push https://x-access-token:${GITOPS_TOKEN}@github.com/karipadma/ecommerce-gitops.git
